<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포켓몬 뉴스허브</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#CC0000;--yellow:#FFCB05;--blue:#3B4CCA;--dark:#1a1a2e;
  --shadow:0 2px 16px rgba(0,0,0,0.10);
  --radius:18px;--card:#fff;--bg:#f4f6fb;--gray:#666;--border:#eee;
}
html{scroll-behavior:smooth;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif;background:var(--bg);color:#111;min-height:100vh;overscroll-behavior:none;}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,var(--red),#a00);
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-ball{width:32px;height:32px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.logo-text{color:#fff;font-size:1.05rem;font-weight:800;letter-spacing:-.3px;}
.logo-text span{color:var(--yellow);}
.dex-btn{
  background:var(--yellow);color:#111;border:none;
  padding:8px 14px;border-radius:22px;
  font-weight:800;font-size:.82rem;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  box-shadow:0 2px 6px rgba(0,0,0,.2);transition:all .2s;
}
.dex-btn:active{transform:scale(.97);}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,var(--dark),#16213e,#0f3460);
  color:#fff;text-align:center;padding:40px 20px 36px;
  position:relative;overflow:hidden;
}
.hero::before,.hero::after{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
}
.hero::before{top:-50px;right:-50px;width:200px;height:200px;background:rgba(255,203,5,.07);}
.hero::after{bottom:-60px;left:-40px;width:240px;height:240px;background:rgba(204,0,0,.09);}
.hero-badge{
  display:inline-block;background:var(--red);color:#fff;
  font-size:.72rem;font-weight:700;padding:3px 12px;
  border-radius:20px;margin-bottom:12px;letter-spacing:.4px;position:relative;z-index:1;
}
.hero h1{font-size:clamp(1.5rem,5vw,2.4rem);font-weight:900;margin-bottom:8px;position:relative;z-index:1;}
.hero h1 span{color:var(--yellow);}
.hero p{font-size:.88rem;color:rgba(255,255,255,.7);position:relative;z-index:1;line-height:1.6;}

/* ── CHARACTERS STRIP ── */
.char-section{background:#fff;padding:18px 0 14px;border-bottom:1px solid var(--border);}
.char-title{font-size:.78rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.6px;padding:0 16px 10px;}
.char-scroll{
  display:flex;gap:12px;overflow-x:auto;padding:0 16px 4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.char-scroll::-webkit-scrollbar{display:none;}
.char-card{
  flex-shrink:0;width:76px;text-align:center;cursor:pointer;
  transition:transform .2s;
}
.char-card:active{transform:scale(.94);}
.char-img-wrap{
  width:76px;height:76px;border-radius:16px;overflow:hidden;
  background:linear-gradient(135deg,#f0f3ff,#e8ecff);
  display:flex;align-items:center;justify-content:center;
  border:2px solid transparent;transition:border .2s;
  margin-bottom:5px;
}
.char-card:hover .char-img-wrap{border-color:var(--blue);}
.char-img-wrap img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.18));}
.char-name{font-size:.68rem;font-weight:700;color:#333;line-height:1.3;}
.char-en{font-size:.62rem;color:var(--gray);}

/* ── TABS ── */
.tabs{
  display:flex;overflow-x:auto;background:#fff;
  border-bottom:2px solid var(--border);padding:0 12px;
  gap:0;scrollbar-width:none;position:sticky;top:56px;z-index:100;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex-shrink:0;padding:13px 14px;border:none;background:none;
  font-size:.82rem;font-weight:700;color:var(--gray);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:all .2s;white-space:nowrap;
}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);}

/* ── SECTIONS ── */
.sections{padding:16px 14px 24px;max-width:900px;margin:0 auto;}
.section-panel{display:none;}
.section-panel.active{display:block;}

/* ALL PANEL grid */
.all-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

/* ── CARD ── */
.news-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.card-head{
  display:flex;align-items:center;gap:10px;padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
}
.c-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.i-go{background:linear-gradient(135deg,#FF6B35,#F7C59F);}
.i-pk{background:linear-gradient(135deg,#667eea,#764ba2);}
.i-sw{background:linear-gradient(135deg,#11998e,#38ef7d);}
.i-ev{background:linear-gradient(135deg,#f093fb,#f5576c);}
.c-ttl h2{font-size:.95rem;font-weight:800;}
.c-ttl p{font-size:.72rem;color:var(--gray);margin-top:1px;}
.news-list{padding:10px 14px 14px;display:flex;flex-direction:column;gap:9px;}
.ni{
  display:flex;gap:9px;align-items:flex-start;padding:10px;
  border-radius:11px;background:#f9f9fb;text-decoration:none;
  transition:background .15s;cursor:pointer;
}
.ni:active{background:#eef2ff;}
.nbadge{flex-shrink:0;font-size:.64rem;font-weight:700;padding:3px 7px;border-radius:7px;margin-top:1px;}
.bn{background:#ffe0e0;color:#cc0000;}
.be{background:#e8f0fe;color:#1a73e8;}
.bu{background:#e6f4ea;color:#1a7a3c;}
.bh{background:#fff3e0;color:#e65100;}
.nt{flex:1;min-width:0;}
.nt strong{display:block;font-size:.82rem;font-weight:700;color:#111;line-height:1.4;margin-bottom:2px;}
.nt span{font-size:.74rem;color:var(--gray);line-height:1.4;}
.ndate{font-size:.67rem;color:#bbb;flex-shrink:0;margin-top:2px;}

/* event highlight */
.ev-hi{
  margin:8px 14px 12px;
  background:linear-gradient(135deg,#f5576c,#f093fb);
  border-radius:14px;padding:14px;color:#fff;
}
.ev-hi h3{font-size:.92rem;font-weight:800;margin-bottom:5px;}
.ev-hi p{font-size:.78rem;opacity:.92;line-height:1.5;}
.ev-chip{
  display:inline-block;background:rgba(255,255,255,.25);
  padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;margin-top:7px;
}

/* ── POKEDEX LIST ── */
#dexPanel{display:none;}
#dexPanel.active{display:block;}
.dex-controls{
  display:flex;gap:8px;padding:12px 14px;
  background:#fff;border-bottom:1px solid var(--border);
  position:sticky;top:calc(56px + 44px);z-index:99;
  flex-wrap:wrap;
}
.dex-search{
  flex:1;min-width:140px;padding:10px 14px;border:2px solid var(--border);
  border-radius:24px;font-size:.9rem;outline:none;transition:border .2s;
}
.dex-search:focus{border-color:var(--blue);}
.gen-filter{
  display:flex;gap:6px;overflow-x:auto;padding:0 14px 10px;
  background:#fff;border-bottom:1px solid var(--border);
  scrollbar-width:none;
  position:sticky;top:calc(56px + 44px + 52px);z-index:98;
}
.gen-filter::-webkit-scrollbar{display:none;}
.gf-btn{
  flex-shrink:0;padding:6px 13px;border-radius:20px;border:2px solid var(--border);
  background:#fff;font-size:.75rem;font-weight:700;cursor:pointer;color:var(--gray);
  transition:all .2s;white-space:nowrap;
}
.gf-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.poke-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;padding:14px;
}
.poke-tile{
  background:#fff;border-radius:14px;padding:10px 6px 8px;
  text-align:center;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .2s,box-shadow .2s;
  border:2px solid transparent;
}
.poke-tile:active{transform:scale(.95);}
.poke-tile.selected{border-color:var(--blue);}
.poke-tile img{width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.12));}
.poke-tile .pt-id{font-size:.62rem;color:#bbb;font-weight:600;}
.poke-tile .pt-name{font-size:.72rem;font-weight:800;color:#111;margin-top:1px;line-height:1.3;}
.poke-tile .pt-kr{font-size:.67rem;color:var(--gray);}
.load-more-btn{
  display:block;margin:8px auto 24px;padding:12px 32px;
  background:var(--blue);color:#fff;border:none;border-radius:24px;
  font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;
}
.load-more-btn:active{background:#2a3aaa;}

/* ── DETAIL MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:300;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.overlay.active{display:flex;}
.detail-sheet{
  background:#fff;width:100%;max-width:560px;
  border-radius:24px 24px 0 0;max-height:92vh;
  display:flex;flex-direction:column;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:4px;margin:10px auto 0;}
.sheet-head{
  padding:14px 18px 12px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
}
.sheet-head h2{font-size:1rem;font-weight:800;}
.close-x{
  width:32px;height:32px;border-radius:50%;background:#f0f0f0;
  border:none;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.close-x:active{background:#e0e0e0;}
.sheet-body{overflow-y:auto;padding:16px 18px 24px;-webkit-overflow-scrolling:touch;}
.detail-hero{
  display:flex;gap:16px;align-items:center;
  background:linear-gradient(135deg,#f8f9ff,#eef1ff);
  border-radius:16px;padding:16px;margin-bottom:16px;
}
.d-img{width:110px;height:110px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(0,0,0,.15));}
.d-info{}
.d-id{font-size:.78rem;color:#aaa;font-weight:600;margin-bottom:2px;}
.d-en{font-size:1.3rem;font-weight:900;text-transform:capitalize;line-height:1.2;}
.d-kr{font-size:.95rem;color:#555;font-weight:700;margin-bottom:8px;}
.type-row{display:flex;gap:7px;flex-wrap:wrap;}
.tbadge{padding:4px 13px;border-radius:20px;font-size:.76rem;font-weight:700;color:#fff;text-transform:capitalize;}

/* detail tabs */
.dtabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;gap:0;}
.dtab{
  flex:1;padding:10px 4px;border:none;background:none;
  font-size:.78rem;font-weight:700;color:var(--gray);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;
}
.dtab.active{color:var(--blue);border-bottom-color:var(--blue);}
.dpanel{display:none;}
.dpanel.active{display:block;}

/* stats */
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sl{width:65px;font-size:.75rem;color:var(--gray);font-weight:600;flex-shrink:0;}
.sv{width:32px;font-size:.82rem;font-weight:800;text-align:right;flex-shrink:0;}
.sb{flex:1;background:#eee;border-radius:4px;height:8px;overflow:hidden;}
.sf{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--blue),#6c63ff);transition:width .6s;}

/* evolution */
.evo-chain{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;padding:8px 0;}
.evo-step{text-align:center;cursor:pointer;}
.evo-step img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.12));}
.evo-step .es-name{font-size:.75rem;font-weight:700;}
.evo-step .es-kr{font-size:.68rem;color:var(--gray);}
.evo-arrow{font-size:1.2rem;color:#ccc;flex-shrink:0;}
.evo-method{font-size:.65rem;color:var(--blue);font-weight:600;margin-top:1px;}

/* moves */
.move-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.move-chip{
  background:#f4f6fb;border-radius:10px;padding:7px 10px;
  font-size:.76rem;font-weight:700;color:#333;
  display:flex;align-items:center;justify-content:space-between;gap:4px;
}
.move-type{font-size:.64rem;padding:2px 7px;border-radius:8px;color:#fff;font-weight:700;white-space:nowrap;}

/* games */
.game-grid{display:flex;flex-wrap:wrap;gap:7px;}
.game-chip{
  background:#f0f3ff;color:var(--blue);
  font-size:.74rem;font-weight:700;padding:5px 12px;
  border-radius:20px;text-transform:capitalize;
}

/* loading spinner */
.spinner{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:24px;color:var(--gray);font-size:.88rem;
}
.spin{
  width:20px;height:20px;border:3px solid #eee;
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── TYPE COLORS ── */
.t-fire{background:#F08030;} .t-water{background:#6890F0;}
.t-grass{background:#78C850;} .t-electric{background:#F8D030;color:#333!important;}
.t-psychic{background:#F85888;} .t-ice{background:#98D8D8;color:#333!important;}
.t-dragon{background:#7038F8;} .t-dark{background:#705848;}
.t-fairy{background:#EE99AC;color:#333!important;} .t-normal{background:#A8A878;}
.t-fighting{background:#C03028;} .t-flying{background:#A890F0;}
.t-poison{background:#A040A0;} .t-ground{background:#E0C068;color:#333!important;}
.t-rock{background:#B8A038;} .t-bug{background:#A8B820;color:#333!important;}
.t-ghost{background:#705898;} .t-steel{background:#B8B8D0;color:#333!important;}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .poke-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));}
  .all-grid{grid-template-columns:repeat(2,1fr);}
  .overlay{align-items:center;}
  .detail-sheet{border-radius:24px;max-height:88vh;}
  .sheet-handle{display:none;}
}
@media(max-width:480px){
  .all-grid{grid-template-columns:1fr;}
  .poke-grid{grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;}
  .d-img{width:88px;height:88px;}
  .d-en{font-size:1.1rem;}
  .move-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-ball">⚪</div>
    <span class="logo-text">포켓몬 <span>뉴스허브</span></span>
  </a>
  <button class="dex-btn" onclick="showDex()">📖 포켓몬 도감</button>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">🎉 포켓몬 30주년 기념 2026</div>
  <h1>포켓몬 <span>최신 소식</span></h1>
  <p>GO · TCG Pocket · Switch · 서울 이벤트 한눈에!</p>
</div>

<!-- CHARACTERS -->
<div class="char-section">
  <div class="char-title">인기 캐릭터</div>
  <div class="char-scroll" id="charScroll"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('all',this)">🏠 전체</button>
  <button class="tab-btn" onclick="switchTab('go',this)">📍 GO</button>
  <button class="tab-btn" onclick="switchTab('pocket',this)">🃏 Pocket</button>
  <button class="tab-btn" onclick="switchTab('switch',this)">🎮 Switch</button>
  <button class="tab-btn" onclick="switchTab('event',this)">🗼 서울</button>
</div>

<!-- SECTIONS -->
<div class="sections" id="newsArea">

  <!-- ALL -->
  <div class="section-panel active" id="tab-all">
    <div class="all-grid">
      <div class="news-card" id="card-go"></div>
      <div class="news-card" id="card-pocket"></div>
      <div class="news-card" id="card-switch"></div>
      <div class="news-card" id="card-event"></div>
    </div>
  </div>

  <!-- GO -->
  <div class="section-panel" id="tab-go">
    <div class="news-card" id="card-go2"></div>
  </div>

  <!-- POCKET -->
  <div class="section-panel" id="tab-pocket">
    <div class="news-card" id="card-pocket2"></div>
  </div>

  <!-- SWITCH -->
  <div class="section-panel" id="tab-switch">
    <div class="news-card" id="card-switch2"></div>
  </div>

  <!-- EVENT -->
  <div class="section-panel" id="tab-event">
    <div class="news-card" id="card-event2"></div>
  </div>

</div>

<!-- POKEDEX PANEL (shown instead of sections) -->
<div id="dexPanel">
  <div class="dex-controls">
    <input class="dex-search" id="dexSearch" type="text"
      placeholder="🔍 이름·번호 검색 (한글/영어)"
      oninput="filterDex()" />
  </div>
  <div class="gen-filter" id="genFilter"></div>
  <div class="poke-grid" id="pokeGrid"></div>
  <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()" style="display:none">
    더 불러오기 ▼
  </button>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="detail-sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2 id="sheetTitle">포켓몬 상세</h2>
      <button class="close-x" onclick="closeDetail()">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody">
      <div class="spinner"><div class="spin"></div>불러오는 중...</div>
    </div>
  </div>
</div>

<footer style="text-align:center;padding:24px 16px;color:#bbb;font-size:.75rem;">
  ⚡ 포켓몬 뉴스허브 2026 · 포켓몬 30주년<br>
  © 1995-2026 Nintendo / Creatures / GAME FREAK
</footer>

function buildCard(icon,cls,title,sub,items,highlight){
  const hi = highlight ? `
    <div class="ev-hi">
      <h3>${highlight.title}</h3>
      <p>${highlight.body}</p>
      <span class="ev-chip">${highlight.date}</span>
    </div>` : '';
  const lis = items.map(i=>`
    <a class="ni" href="${i.url}" target="_blank">
      <span class="nbadge ${i.bc}">${i.badge}</span>
      <div class="nt"><strong>${i.title}</strong><span>${i.desc}</span></div>
      <span class="ndate">${i.date}</span>
    </a>`).join('');
  return `
    <div class="card-head">
      <div class="c-icon ${cls}">${icon}</div>
      <div class="c-ttl"><h2>${title}</h2><p>${sub}</p></div>
    </div>
    ${hi}
    <div class="news-list">${lis}</div>`;
}

const TOTAL = 1025;
let allPokes = [];
let filtered = [];
let currentGen = {start:1,end:1025};
let displayCount = 60;

async function initDex(){
  if(allPokes.length) return;
  // build basic list without fetching all — use sprite URL pattern
  allPokes = [];
  for(let i=1;i<=TOTAL;i++){
    allPokes.push({id:i, name:'', loaded:false});
  }
  // fetch names in batch via pokemon list endpoint
  try{
    const r = await fetch(`https://pokeapi.co/api/v2/pokemon?limit=${TOTAL}&offset=0`);
    const d = await r.json();
    d.results.forEach((p,i)=>{
      allPokes[i].name = p.name;
    });
  }catch(e){}
}

  const el = document.getElementById('genFilter');
  el.innerHTML = GENS.map((g,i)=>`
    <button class="gf-btn ${i===0?'active':''}" onclick="setGen(${i},this)">${g.label}</button>
  `).join('');
}

function setGen(idx, btn){
  document.querySelectorAll('.gf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentGen = GENS[idx];
  displayCount = 60;
  document.getElementById('dexSearch').value='';
  renderDex();
}

function filterDex(){
  displayCount = 60;
  renderDex();
}

function renderDex(){
  const q = document.getElementById('dexSearch').value.trim().toLowerCase();
  let pool = allPokes.filter(p=>p.id>=currentGen.start && p.id<=currentGen.end);

  if(q){
    const enQ = KR2EN[q] || q;
    pool = pool.filter(p=>{
      const kr = KR[p.name]||'';
      return p.name.includes(enQ) || kr.includes(q) || String(p.id)===q;
    });
  }

  filtered = pool;
  const shown = filtered.slice(0, displayCount);
  const grid = document.getElementById('pokeGrid');

  grid.innerHTML = shown.map(p=>{
    const kr = KR[p.name]||'';
    const name = p.name ? (p.name.charAt(0).toUpperCase()+p.name.slice(1)) : `#${p.id}`;
    return `
      <div class="poke-tile" onclick="openDetail('${p.name||p.id}')">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png"
          onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png'"
          loading="lazy" alt="${name}">
        <div class="pt-id">#${String(p.id).padStart(3,'0')}</div>
        <div class="pt-name">${name}</div>
        <div class="pt-kr">${kr}</div>
      </div>`;
  }).join('');

  const btn = document.getElementById('loadMoreBtn');
  btn.style.display = (filtered.length > displayCount) ? 'block' : 'none';
}

function loadMore(){
  displayCount += 60;
  renderDex();
}

async function showDex(){
  document.getElementById('newsArea').style.display='none';
  document.getElementById('dexPanel').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section-panel').forEach(p=>p.classList.remove('active'));
  await initDex();
  renderDex();
}

/* ═══════════════════════════ DETAIL ═══════════════════════════ */
async function openDetail(query){
  const overlay = document.getElementById('overlay');
  const body = document.getElementById('sheetBody');
  overlay.classList.add('active');
  body.innerHTML = '<div class="spinner"><div class="spin"></div>불러오는 중...</div>';
  document.getElementById('sheetTitle').textContent = '포켓몬 상세';

  // Resolve Korean
  let q = String(query).toLowerCase();
  if(KR2EN[q]) q = KR2EN[q];

  try{
    const [pRes, specRes] = await Promise.all([
      fetch(`https://pokeapi.co/api/v2/pokemon/${q}`),
      fetch(`https://pokeapi.co/api/v2/pokemon-species/${q}`)
    ]);
    if(!pRes.ok) throw new Error('not found');
    const p = await pRes.json();
    const spec = specRes.ok ? await specRes.json() : null;

    // Evolution chain
    let evoHtml = '';
    if(spec && spec.evolution_chain){
      try{
        const evR = await fetch(spec.evolution_chain.url);
        const evD = await evR.json();
        const chain = flattenEvo(evD.chain);
        evoHtml = buildEvoHtml(chain);
      }catch(e){}
    }

    const enName = p.name.charAt(0).toUpperCase()+p.name.slice(1);
    const kr = KR[p.name]||'';
    document.getElementById('sheetTitle').textContent = kr||enName;

    const img = p.sprites.other['official-artwork'].front_default || p.sprites.front_default;
    const types = p.types.map(t=>t.type.name);
    const typeHtml = types.map(t=>{
      const dark = DARK_TYPE.includes(t);
      return `<span class="tbadge t-${t}" style="${dark?'color:#333':''}">${t}</span>`;
    }).join('');

    // Stats
    const statsHtml = p.stats.map(s=>{
      const pct = Math.min(100,Math.round(s.base_stat/255*100));
      return `<div class="stat-row">
        <span class="sl">${SL[s.stat.name]||s.stat.name}</span>
        <span class="sv">${s.base_stat}</span>
        <div class="sb"><div class="sf" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

    // Moves (first 20 level-up moves)
    const moves = p.moves
      .filter(m=>m.version_group_details.some(v=>v.move_learn_method.name==='level-up'))
      .slice(0,20);
    const moveHtml = moves.length ? moves.map(m=>{
      const mn = m.move.name.replace(/-/g,' ');
      return `<div class="move-chip">
        <span>${mn.charAt(0).toUpperCase()+mn.slice(1)}</span>
      </div>`;
    }).join('') : '<p style="color:#aaa;font-size:.82rem">기술 정보 없음</p>';

    // Games
    const games = [...new Set(p.game_indices.map(g=>g.version.name))];
    const gameHtml = games.length ? games.map(g=>
      `<span class="game-chip">${g}</span>`
    ).join('') : '<p style="color:#aaa;font-size:.82rem">등장 게임 정보 없음</p>';

    body.innerHTML = `
      <div class="detail-hero">
        <img class="d-img" src="${img}" alt="${enName}">
        <div class="d-info">
          <div class="d-id">#${String(p.id).padStart(3,'0')}</div>
          <div class="d-en">${enName}</div>
          ${kr?`<div class="d-kr">${kr}</div>`:''}
          <div class="type-row">${typeHtml}</div>
        </div>
      </div>

      <div class="dtabs">
        <button class="dtab active" onclick="switchDTab('stats',this)">📊 스탯</button>
        <button class="dtab" onclick="switchDTab('evo',this)">🔄 진화</button>
        <button class="dtab" onclick="switchDTab('moves',this)">⚔️ 기술</button>
        <button class="dtab" onclick="switchDTab('games',this)">🎮 게임</button>
      </div>

      <div class="dpanel active" id="dp-stats">${statsHtml}</div>
      <div class="dpanel" id="dp-evo">${evoHtml||'<p style="color:#aaa;font-size:.82rem;padding:8px 0">진화 없음</p>'}</div>
      <div class="dpanel" id="dp-moves"><div class="move-grid">${moveHtml}</div></div>
      <div class="dpanel" id="dp-games"><div class="game-grid">${gameHtml}</div></div>
    `;

  }catch(e){
    body.innerHTML = `<div style="text-align:center;padding:32px;color:#cc0000;font-weight:700">
      ❌ 포켓몬을 찾을 수 없습니다
    </div>`;
  }
}

function switchDTab(id, btn){
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dpanel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dp-'+id).classList.add('active');
}

function flattenEvo(node, arr=[]){
  const name = node.species.name;
  const detail = node.evolution_details[0];
  const method = detail ? (detail.min_level ? `Lv.${detail.min_level}` : detail.item ? detail.item.name : detail.trigger?.name||'') : '';
  arr.push({name, method});
  if(node.evolves_to.length){
    node.evolves_to.forEach(child=>flattenEvo(child,arr));
  }
  return arr;
}

function buildEvoHtml(chain){
  if(chain.length<=1) return '<p style="color:#aaa;font-size:.82rem;padding:8px 0">진화 없음</p>';
  const steps = chain.map((c,i)=>{
    const nameId = c.name;
    let id = 1;
    // get ID from allPokes
    const found = allPokes.find(p=>p.name===nameId);
    if(found) id = found.id;
    const kr = KR[nameId]||'';
    const en = nameId.charAt(0).toUpperCase()+nameId.slice(1);
    const arrow = (i>0) ? `<div style="text-align:center"><div class="evo-arrow">→</div><div class="evo-method">${chain[i].method}</div></div>` : '';
    return `${arrow}<div class="evo-step" onclick="closeDetail();setTimeout(()=>openDetail('${nameId}'),100)">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png"
        onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png'"
        style="width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,.12))" alt="${en}">
      <div class="es-name">${en}</div>
      <div class="es-kr">${kr}</div>
    </div>`;
  }).join('');
  return `<div class="evo-chain">${steps}</div>`;
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('active');
}

function handleOverlay(e){
  if(e.target===document.getElementById('overlay')) closeDetail();
}

/* ═══════════════════════════ INIT ═══════════════════════════ */
fillCards();
fillChars();
buildGenFilter();
</script>
